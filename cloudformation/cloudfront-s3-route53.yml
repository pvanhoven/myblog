AWSTemplateFormatVersion: '2010-09-09'
Description: "CloudFormation template for S3 origin + CloudFront distribution + Route53 records. Parameterized for dev/prod. Uses CloudFront Origin Access Identity (OAI) and a CloudFront Function to redirect www -> apex."

Parameters:
  Environment:
    Type: String
    Default: dev
    Description: Deployment environment (dev or prod)
  DomainName:
    Type: String
    Description: The apex domain (e.g., phillvanhoven.com)
  HostedZoneId:
    Type: String
    Description: Route53 Hosted Zone ID
  CertificateArn:
    Type: String
    Description: ARN of an ACM certificate in us-east-1 for the domain and www
  BucketNamePrefix:
    Type: String
    Default: "myblog"
    Description: Prefix for the S3 bucket name; final name will include Environment to avoid collisions
  EnableLogging:
    Type: String
    AllowedValues: ["true","false"]
    Default: "false"

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-${Environment}-${AWS::AccountId}"
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Suspended

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${SiteBucket.Arn}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${BucketNamePrefix}-${Environment}-oac"
        Description: "OAC for S3 origin"
        SigningProtocol: sigv4
        SigningBehavior: always
        OriginAccessControlOriginType: s3

  TrailingSlashFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub "trailing-slash-fn-${Environment}"
      AutoPublish: true
      FunctionConfig:
        Comment: "Rewrite URIs ending with / to /index.html for Hugo sites"
        Runtime: cloudfront-js-1.0
      FunctionCode: |
        function handler(event) {
          var request = event.request;
          var uri = request.uri || '/';

          // If URI ends with '/', append index.html
          if (uri.endsWith('/')) {
            request.uri = uri + 'index.html';
            return request;
          }

          // If URI has no file extension, treat as directory and serve /index.html
          if (uri.indexOf('.') === -1) {
            if (!uri.startsWith('/')) uri = '/' + uri;
            request.uri = uri.replace(/\/+$/, '') + '/index.html';
            return request;
          }

          return request;
        }

  SiteCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${BucketNamePrefix}-${Environment}-cache-policy"
        Comment: "Cache policy for site"
        DefaultTTL: 86400
        MinTTL: 0
        MaxTTL: 31536000
        ParametersInCacheKeyAndForwardedToOrigin:
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none


  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "CloudFront distribution for ${DomainName} (${Environment})"
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            S3OriginConfig: {}
            OriginAccessControlId: !Ref CloudFrontOAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          CachePolicyId: !Ref SiteCachePolicy
          Compress: true
          # Using AWS-managed Response Headers Policy (managed ID is region-specific).
          # This is the managed security headers policy; hardcoded here because CloudFront
          # does not provide a stable logical name across accounts/regions. Verify the
          # policy ID exists in the target region before deploying.
          ResponseHeadersPolicyId: "67f7725c-6f97-4210-82d7-5512b31e9d03"
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt TrailingSlashFunction.FunctionMetadata.FunctionARN
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        PriceClass: PriceClass_100
        Aliases:
          - !Ref DomainName
#          - !Sub "www.${DomainName}"

  ApexRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt CloudFrontDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

#  WWWRecord:
#    Type: AWS::Route53::RecordSet
#    Properties:
#      HostedZoneId: !Ref HostedZoneId
#      Name: !Sub "www.${DomainName}"
#      Type: A
#      AliasTarget:
#        DNSName: !GetAtt CloudFrontDistribution.DomainName
#        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteBucketName:
    Description: S3 bucket for site
    Value: !Ref SiteBucket
  CloudFrontDomain:
    Description: CloudFront distribution domain name
    Value: !GetAtt CloudFrontDistribution.DomainName
  DistributionId:
    Description: CloudFront distribution id
    Value: !Ref CloudFrontDistribution
