AWSTemplateFormatVersion: '2010-09-09'
Description: Minimal IAM policy for deploying static site to S3 and creating CloudFront invalidations.

Resources:
  DeployPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: !Sub "deploy-static-site-${AWS::AccountId}"
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: S3PutGetList
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:GetObject
              - s3:ListBucket
              - s3:DeleteObject
            Resource:
              - !Sub "arn:aws:s3:::${BucketName}"
              - !Sub "arn:aws:s3:::${BucketName}/*"
          - Sid: CloudFrontInvalidation
            Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
            Resource: "*"

Parameters:
  BucketName:
    Type: String
    Description: Name of the S3 bucket to allow deployment to
